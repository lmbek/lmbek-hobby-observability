# Observability stack — monitoring, logging, and dashboards.
# Connects directly to services, bypassing the proxy.
# Usage: docker compose up -d

services:
  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - hobby-net

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - hobby-net

  # ── Grafana Alloy ───────────────────────────────────────────────────────────
  # Collects Docker container metrics and logs, forwards to Prometheus and Loki.
  alloy:
    image: grafana/alloy:latest
    ports:
      - "12345:12345"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - /etc/alloy/config.alloy
    restart: unless-stopped
    networks:
      - hobby-net

  # ── Loki ────────────────────────────────────────────────────────────────────
  # Log aggregation — receives container logs from Alloy.
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    restart: unless-stopped
    networks:
      - hobby-net

volumes:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  hobby-net:
    external: true
    name: orchestrators_hobby-net
