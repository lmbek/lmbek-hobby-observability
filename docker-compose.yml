# Observability stack — monitoring, logging, and dashboards.
# Connects directly to services, bypassing the proxy.
# Usage: docker compose up -d

name: monitoring

services:
  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - hobby-internal

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_EXPLORE_ENABLED=true
      - GF_FEATURE_TOGGLES_ENABLE=
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - hobby-internal

  # ── Grafana Alloy ───────────────────────────────────────────────────────────
  # Collects Docker container metrics and logs, forwards to Prometheus and Loki.
  alloy:
    image: grafana/alloy:latest
    ports:
      - "12345:12345"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    restart: unless-stopped
    networks:
      - hobby-internal

  # ── Loki ────────────────────────────────────────────────────────────────────
  # Log aggregation — receives container logs from Alloy.
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    restart: unless-stopped
    networks:
      - hobby-internal

  # ── cAdvisor ─────────────────────────────────────────────────────────────────
  # Exposes container-level CPU, memory, network, and disk metrics for Prometheus.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    networks:
      - hobby-internal

volumes:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  hobby-internal:
    external: true
    name: hobby-internal
